<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="{% static 'img/icone.ico' %}">
    <link rel="stylesheet" href="{% static 'css/ocorrencia/ocorrencia.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>Trânsito Apodi</title>
</head>

<body>

    <header class="header">
        <div class="texto-header">
            <h1>Registrar Ocorrência</h1>
            <h2>Faça registros de ocorrências</h2>
        </div>

        <a href="#" class="botao-logo">
            <img class="logo-img" src="{% static 'img/logo.png' %}" alt="Logo">
        </a>
    </header>

    <aside class="sidebar">
        <nav>
            <a href="{% url 'home' %}" class="sidebar-button">
                <span>
                    <i class="bi bi-house-door-fill"></i>
                    <span>Início</span>
                </span>
            </a>

            <a href="#" class="sidebar-button">
                <span>
                    <i class="bi bi-person-fill"></i>
                    <span>Perfil</span>
                </span>
            </a>
        </nav>
    </aside>

    <section class="first-section">
        <div class="conteudo-principal">

            <form class="ipt" method="POST">
                {% csrf_token %}

                <span>
                    <label for="ocorrencia">Tipo de ocorrência</label>
                </span>

                <div class="input">
                    <input list="ocorrencias" id="ocorrencia" name="ocorrencia" placeholder="Qual problema você deseja registrar?">

                    <datalist id="ocorrencias">
                        <option value="Acidente">
                        <option value="Obra">
                        <option value="Congestionamento">
                    </datalist>
                </div>

                <span>
                    <label for="endereco">Endereço</label>
                </span>

                <div class="input">
                    <input type="text" id="endereco" name="endereco" placeholder="Insira aqui o endereço">
                </div>

                <span>
                    <label for="hora">Insira aqui o horário</label>
                </span>

                <div class="input">
                    <input type="time" id="hora" name="hora">
                </div>

                <button class="botao-submeter" type="submit">
                    Registrar
                </button>

            </form>

        </div>
    </section>

</body>
</html>
