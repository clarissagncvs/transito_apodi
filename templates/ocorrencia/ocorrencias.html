<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../static/img/icone.ico">
    <link rel="stylesheet" href="{% static 'css/ocorrencia/ocorrencia.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Trânsito Apodi</title>
</head>

<body>
    <header class="header">
        <div class="texto-header">
            <h1>Registrar Ocorrência</h1>
            <h2>faça registros de ocorrências</h2>
        </div>
        <a href="#" class="botao-logo">
            <img class="logo-img" src="../../static/img/logo.png">
        </a>
    </header>

    <aside class="sidebar">
        <nav>
            <a href="{% url 'home' %}" class="sidebar-button">
                <span>
                    <i class="bi bi-house-door-fill"></i>
                    <span>início</span>
                </span>
            </a>
            <a href="#" class="sidebar-button">
                <span>
                    <i class="bi bi-person-fill"></i>
                    <span>perfil</span>
                </span>
            </a>
        </nav>
    </aside>

    <section class="first-section">
        <div class="conteudo-principal">
            <form class="ipt">
                <span>
                    <label for="ocorrencia">Tipo de ocorrência</label>
                </span>
                <div class="input">
                    <input id="ocorrencia" name="ocorrencia" placeholder="Qual problema você deseja registrar?"></input>

                    <ul class="lista-ocorrencias">
                        <li onclick="selecionar('Acidente')">Acidente</li>
                        <li onclick="selecionar('Obra')">Obra</li>
                        <li onclick="selecionar('Congestionamento')">Congestionamento</li>
                    </ul>
                </div>
                <span>
                    <label for="text">Endereço</label>
                </span>
                <div class="input">
                    <input type="text" placeholder="Insira aqui o endereço">            
                </div>
                <span>
                    <label for="fora">Insira aqui o horário</label>
                </span>
                <div class="input">
                    <input type="time" id="hora" name="hora">
                </div>
                <button class="botao-submeter" type="submit">Registrar</button>
            </form>
        </div>

    </section>

<script src="../../static/js/ocorrencias.js"></script>

</body>

</html>
