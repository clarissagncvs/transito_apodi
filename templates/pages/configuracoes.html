{% extends 'base.html' %}

{% block title %} Configurações {% endblock %}

{% block content %}
<section class="first-section">
    <div class="container-config">
        <h1 class="titulo-principal">Configurações</h1>

            <div class="tema-config card">
                <div class="icon-wrapper">
                    <i class="bi bi-palette-fill"></i>
                </div>
                <h2 class="titulo-c">Tema</h2>
                <h3>Mudar tema</h3>
                <div>   
                    <button id="btn-tema-escuro" type="button" class="btn-dm">Tema escuro</button>
                    <button id="btn-tema-claro" type="button" class="btn-lm">Tema claro</button>
                </div>
            </div>

            <a href="notificacoes.html" class="notif-btn">
                <div class="notif card">
                    <div class="icon-wrapper">
                        <i class="bi bi-bell-fill"></i>
                    </div>
                <h2 class="titulo-c">Notificações</h2>
                <!-- Notificações de email, ocorrências... -->
                </div>
            </a>


         <form class="config-psswd" method="POST">    
            <div class="alter-psswd card">
                <div class="icon-wrapper">
                    <i class="bi bi-chat-right-dots-fill"></i>
                </div>
                <h2 class="titulo-c">Alterar senha</h2>
                    <div class="ipt-psswd">
                        <label for="senha-atual">Senha atual</label>
                        <input type="password" id="senha-atual" name="senha-atual">
                    </div>

                    <div class="ipt-psswd">
                        <label for="nova-senha">Nova senha</label>
                        <input type="password" id="nova-senha" name="nova-senha">
                    </div>

                    <div class="ipt-psswd">
                        <label for="confirmar-senha">Confirmar nova senha</label>
                        <input type="password" id="confirmar-senha" name="confirmar-senha">
                    </div>
                     <div class="save-alter">
                        <button type="submit" class="btn-config-save">Alterar senha</button>
                    </div>
            </div>
            </form>
        <div>
            <button type="button" id="end-account">Excluir conta</button>
        </div>
    </div>
</section>
{% endblock %}
