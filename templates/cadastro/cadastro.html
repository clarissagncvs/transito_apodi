<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se - Trânsito Apodi</title>

    <link rel="stylesheet" href="../../static/css/cadastro/cadastro.css">
    
<body>

        <div class="site-description">           
            <h2 style="color: #ff8000; font-size: 60px;"><strong>TRÂNSITO APODI</strong></h2>
            <p>Consulte o tráfego, acidentes e obras da cidade de Apodi/RN</p>
        </div>

    <main class="sign-container">
        <div class="retangulo">
            <h1>Cadastrar</h1>

            <form action="" method="">
                <div class="form-group">
                    <label for="cadastro-nome">Nome:</label>
                    <input class="input-field" id="cadastro-nome" type="text" name="nome" placeholder="Nome">
                </div>

                <div class="form-group">
                    <label for="cadastro-sobrenome">Sobrenome:</label>
                    <input class="input-field" id="cadastro-sobrenome" type="text" name="sobrenome" placeholder="Sobrenome">
                 </div>

                <div class="form-group">
                    <label for="cadastro-email">Email:</label>
                    <input class="input-field" id="cadastro-email" type="email" name="email" placeholder="Insira seu email">
                </div>

                <div class="form-group">
                    <label for="cadastro-senha">Senha:</label>
                    <input class="input-field" id="cadastro-senha" type="password" name="senha" placeholder="Insira uma senha">
                </div>

                <div class="form-group">
                    <input class="btn-primary" type="submit" value="Cadastrar-se">
                </div>
                <div class="form-links">
                    <a href="login.html" target="_self">Já possui uma conta? Entrar</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
