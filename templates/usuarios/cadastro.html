<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se - Trânsito Apodi</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/cadastro/cadastro.css' %}">
</head>
    
<body>

        <div class="site-description">           
            <h2 style="color: #ff8000; font-size: 60px;"><strong>TRÂNSITO APODI</strong></h2>
            <p>Consulte o tráfego, acidentes e obras da cidade de Apodi/RN</p>
        </div>

    <main class="sign-container">
        <div class="retangulo">
            <h1>Cadastrar</h1>

           <form method="POST" action="{% url 'apps.usuarios:cadastro' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label>Username:</label>
                    <input class="input-field" type="text" name="username" placeholder="Usuário">
                </div>

                <div class="form-group">
                    <label>Nome:</label>
                    <input class="input-field" type="text" name="first_name" placeholder="Nome">
                </div>

                <div class="form-group">
                    <label>Sobrenome:</label>
                    <input class="input-field" type="text" name="last_name" placeholder="Sobrenome">
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input class="input-field" type="email" name="email" placeholder="Email">
                </div>

                <div class="form-group">
                    <label>Senha:</label>
                    <input class="input-field" type="password" name="password1" placeholder="Senha">
                </div>

                <div class="form-group">
                    <label>Confirmar senha:</label>
                    <input class="input-field" type="password" name="password2" placeholder="Confirmar senha">
                </div>

                <div class="form-group">
                    <button class="btn-primary" type="submit">Cadastrar-se</button>
                </div>

                <div class="form-links">
                    <a href="{% url 'apps.usuarios:login' %}">Já possui conta? Entrar</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
