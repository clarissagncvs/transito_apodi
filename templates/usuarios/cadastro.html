<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastre-se - Trânsito Apodi</title>

    <link rel="stylesheet" href="{% static 'css/cadastro/cadastro.css' %}">
</head>

<body>

    <div class="site-description">
        <h2 style="color: #ff8000; font-size: 60px;">
            <strong>TRÂNSITO APODI</strong>
        </h2>
        <p>Consulte o tráfego, acidentes e obras da cidade de Apodi/RN</p>
    </div>

    <main class="sign-container">
        <div class="retangulo">

            <h1>Cadastrar</h1>

            <form method="POST" action="{% url 'apps.usuarios:cadastro' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Username:</label>
                    <input id="username" class="input-field" type="text" name="username" placeholder="Usuário" required>
                </div>

                <div class="form-group">
                    <label for="first_name">Nome:</label>
                    <input id="first_name" class="input-field" type="text" name="first_name" placeholder="Nome" required>
                </div>

                <div class="form-group">
                    <label for="last_name">Sobrenome:</label>
                    <input id="last_name" class="input-field" type="text" name="last_name" placeholder="Sobrenome" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input id="email" class="input-field" type="email" name="email" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <label for="password1">Senha:</label>
                    <input id="password1" class="input-field" type="password" name="password1" placeholder="Senha" required>
                </div>

                <div class="form-group">
                    <label for="password2">Confirmar senha:</label>
                    <input id="password2" class="input-field" type="password" name="password2" placeholder="Confirmar senha" required>
                </div>

                <div class="form-group">
                    <button class="btn-primary" type="submit">
                        Cadastrar-se
                    </button>
                </div>

                <div class="form-links">
                    <a href="{% url 'apps.usuarios:login' %}">
                        Já possui conta? Entrar
                    </a>
                </div>

            </form>

        </div>
    </main>

</body>
</html>
