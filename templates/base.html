<!DOCTYPE html>
<html lang="pt-br">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'img/icone.ico' %}">
    <link rel="stylesheet" href="{% static 'css/partials/index.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
    <aside class="sidebar">
        <nav>
            <div class="caixa-logo">
                <img class="logo-img" src="{% static 'img/logo.png' %}" alt="Logo Sidebar">

                <div class="logo-texto">
                    <span class="txt-transito">trânsito</span>
                    <span class="txt-apodi">apodi</span>
                </div>
            </div>

            <a href="{% url 'home' %}" class="sidebar-button">
                <span>
                    <i class="bi bi-house-door-fill"></i>
                    <span>Início</span>
                </span>
            </a>
            <a href="{% url 'apps.usuarios:perfil' %}" class="sidebar-button">
                <span>
                    <i class="bi bi-person-fill"></i>
                    <span>Perfil</span>
                </span>
            </a>
            <a href="{% url 'apps.usuarios:configuracoes' %}" class="sidebar-button">
                <span>
                    <i class="bi bi-gear"></i>
                    <span>Configurações</span>
                </span>
            </a>
            <div class="sidebar-button">
                <form method="POST" action="{% url 'apps.usuarios:logout' %}" class="form-logout">
                    {% csrf_token %}
                    <span>
                        <i class="bi bi-box-arrow-right"></i>
                        <button type="submit">Sair</button>
                    </span>
                </form>
            </div>
        </nav>
    </aside>

    {% block content %}

    {% endblock %}
